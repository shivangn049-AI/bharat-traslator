<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>LinguaFlow — Language Translation Tool</title>
  <meta name="description" content="Translate text instantly between 100+ languages with LinguaFlow. Features copy, text-to-speech, and swap language support." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Outfit:wght@400;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- Animated Background -->
  <div class="bg-grid"></div>
  <canvas id="particleCanvas"></canvas>

  <!-- Header -->
  <header class="header">
    <div class="logo">
      <div class="logo-icon">
        <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
          <path d="M12.87 15.07l-2.54-2.51.03-.03A17.52 17.52 0 0014.07 6H17V4h-7V2H8v2H1v2h11.17C11.5 7.92 10.44 9.75 9 11.35 8.07 10.32 7.3 9.19 6.69 8h-2c.73 1.63 1.73 3.17 2.98 4.56l-5.09 5.02L4 19l5-5 3.11 3.11.76-2.04zM18.5 10h-2L12 22h2l1.12-3h4.75L21 22h2l-4.5-12zm-2.62 7l1.62-4.33L19.12 17h-3.24z" fill="currentColor"/>
        </svg>
      </div>
      <span class="logo-text">LinguaFlow</span>
    </div>
    <div class="header-tagline">Translate · Listen · Connect</div>
    <div class="char-count-display" id="headerCharCount">0 / 5000</div>
  </header>

  <!-- Main Content -->
  <main class="main-container">

    <!-- Language Bar -->
    <div class="language-bar">
      <div class="lang-selector-wrap" id="sourceLangWrap">
        <label class="lang-label">From</label>
        <div class="custom-select-wrapper">
          <select id="sourceLang" class="lang-select">
            <option value="auto">Detect Language</option>
          </select>
          <span class="select-arrow">▾</span>
        </div>
      </div>

      <button class="swap-btn" id="swapBtn" title="Swap languages">
        <svg viewBox="0 0 24 24" fill="none">
          <path d="M7 16V4m0 0L3 8m4-4l4 4M17 8v12m0 0l4-4m-4 4l-4-4" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </button>

      <div class="lang-selector-wrap" id="targetLangWrap">
        <label class="lang-label">To</label>
        <div class="custom-select-wrapper">
          <select id="targetLang" class="lang-select">
          </select>
          <span class="select-arrow">▾</span>
        </div>
      </div>
    </div>

    <!-- Quick Language Pills -->
    <div class="quick-langs">
      <span class="quick-label">Quick:</span>
      <button class="pill" data-lang="es">🇪🇸 Spanish</button>
      <button class="pill" data-lang="fr">🇫🇷 French</button>
      <button class="pill" data-lang="de">🇩🇪 German</button>
      <button class="pill" data-lang="ja">🇯🇵 Japanese</button>
      <button class="pill" data-lang="zh">🇨🇳 Chinese</button>
      <button class="pill" data-lang="ar">🇸🇦 Arabic</button>
      <button class="pill" data-lang="hi">🇮🇳 Hindi</button>
      <button class="pill" data-lang="pt">🇧🇷 Portuguese</button>
    </div>

    <!-- Translation Cards -->
    <div class="cards-container">

      <!-- Source Card -->
      <div class="card source-card">
        <div class="card-header">
          <div class="card-title">
            <div class="dot dot-blue"></div>
            Source Text
          </div>
          <div class="card-actions">
            <button class="action-btn" id="clearBtn" title="Clear text">
              <svg viewBox="0 0 24 24" fill="none"><path d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/></svg>
            </button>
            <button class="action-btn" id="sourceTtsBtn" title="Listen to source text">
              <svg viewBox="0 0 24 24" fill="none"><path d="M15.536 8.464a5 5 0 010 7.072M12 6v12M9.172 9.172a4 4 0 000 5.656M5.636 5.636a9 9 0 0012.728 0" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/></svg>
            </button>
            <button class="action-btn" id="sourceCopyBtn" title="Copy source text">
              <svg viewBox="0 0 24 24" fill="none"><path d="M8 16H6a2 2 0 01-2-2V6a2 2 0 012-2h8a2 2 0 012 2v2m-6 12h8a2 2 0 002-2v-8a2 2 0 00-2-2h-8a2 2 0 00-2 2v8a2 2 0 002 2z" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/></svg>
            </button>
          </div>
        </div>
        <textarea
          id="sourceText"
          class="text-area"
          placeholder="Type or paste your text here..."
          maxlength="5000"
          spellcheck="true"
          autofocus
        ></textarea>
        <div class="card-footer">
          <div class="char-count" id="charCount">0 / 5000</div>
          <button class="translate-btn" id="translateBtn">
            <svg viewBox="0 0 24 24" fill="none"><path d="M3 5h12M9 3v2m1.048 9.5A18.022 18.022 0 016.412 9m6.088 9h7M11 21l5-10 5 10M12.751 5C11.783 10.77 8.07 15.61 3 18.129" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
            Translate
          </button>
        </div>
      </div>

      <!-- Divider with icon -->
      <div class="cards-divider">
        <div class="divider-icon" id="translatingIndicator">
          <svg viewBox="0 0 24 24" fill="none"><path d="M14 5l7 7m0 0l-7 7m7-7H3" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
        </div>
      </div>

      <!-- Target Card -->
      <div class="card target-card">
        <div class="card-header">
          <div class="card-title">
            <div class="dot dot-purple"></div>
            Translation
          </div>
          <div class="card-actions">
            <button class="action-btn" id="targetTtsBtn" title="Listen to translation">
              <svg viewBox="0 0 24 24" fill="none"><path d="M15.536 8.464a5 5 0 010 7.072M12 6v12M9.172 9.172a4 4 0 000 5.656M5.636 5.636a9 9 0 0012.728 0" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/></svg>
            </button>
            <button class="action-btn" id="targetCopyBtn" title="Copy translation">
              <svg viewBox="0 0 24 24" fill="none"><path d="M8 16H6a2 2 0 01-2-2V6a2 2 0 012-2h8a2 2 0 012 2v2m-6 12h8a2 2 0 002-2v-8a2 2 0 00-2-2h-8a2 2 0 00-2 2v8a2 2 0 002 2z" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/></svg>
            </button>
          </div>
        </div>
        <div class="text-area output-area" id="outputArea">
          <span class="placeholder-text">Your translation will appear here...</span>
        </div>
        <div class="card-footer output-footer">
          <div class="detected-lang" id="detectedLang"></div>
          <div class="word-count" id="wordCount"></div>
        </div>
      </div>
    </div>

    <!-- History Section -->
    <div class="history-section" id="historySection">
      <div class="history-header">
        <h3 class="history-title">
          <svg viewBox="0 0 24 24" fill="none" width="18"><path d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>
          Recent Translations
        </h3>
        <button class="clear-history-btn" id="clearHistoryBtn">Clear All</button>
      </div>
      <div class="history-list" id="historyList"></div>
    </div>

  </main>

  <!-- Toast Notification -->
  <div class="toast" id="toast"></div>

  <script src="app.js"></script>
</body>
</html>
